name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    steps:
      - uses: actions/checkout@v4
        with:
          path: project-boost

      - name: Checkout boost-core sibling
        uses: actions/checkout@v4
        with:
          repository: SanderMuller/boost-core
          path: boost-core
          ref: main

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Wire sibling checkout as path repository
        working-directory: project-boost
        run: |
          composer config repositories.boost-core path ../boost-core
          composer config minimum-stability dev
          composer config prefer-stable true

      - name: Install dependencies
        working-directory: project-boost
        run: composer install --prefer-dist --no-progress

      - name: Run CI
        working-directory: project-boost
        run: composer ci
